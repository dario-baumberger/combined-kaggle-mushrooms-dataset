name: Build and Publish Dataset

on:
  workflow_dispatch:
    inputs:
      version_notes:
        description: Version notes
        required: true
        default: ""

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check python/
      - run: uv run ruff format --check python/

  publish:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - run: uv sync

      - name: Download datasets
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          TQDM_MININTERVAL: '10'
        run: uv run python -m python.download

      - name: Merge and deduplicate
        env:
          TQDM_MININTERVAL: '10'
        run: uv run python -m python.merge

      - name: Validate
        env:
          TQDM_MININTERVAL: '10'
        run: uv run python -m python.validate

      - name: Publish to Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          TQDM_MININTERVAL: '10'
        run: uv run python -m python.publish "${{ github.event.inputs.version_notes }}"
